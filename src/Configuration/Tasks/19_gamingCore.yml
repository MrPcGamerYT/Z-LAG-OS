title: ZLAG Gaming Core Engine
description: Ultra low latency + max FPS stable system-level gaming optimizations
actions:

  - !writeStatus: {status: "Activating ZLAG Gaming Engine"}

  # =========================
  # BOOT / TIMER STABILITY (SAFE REAL TUNING)
  # =========================

  - !cmd: {command: 'bcdedit /deletevalue useplatformclock'}
  - !cmd: {command: 'bcdedit /set disabledynamictick yes'}

  # (REMOVED useplatformtick — causes instability on modern Windows)

  # =========================
  # MULTIMEDIA SCHEDULER (REAL GAMING PRIORITY SYSTEM)
  # =========================

  - !registryValue:
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile'
      value: 'SystemResponsiveness'
      type: REG_DWORD
      data: 0

  - !registryValue:
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile'
      value: 'NetworkThrottlingIndex'
      type: REG_DWORD
      data: 4294967295

  - !registryValue:
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Games'
      value: 'GPU Priority'
      type: REG_DWORD
      data: 8

  - !registryValue:
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Games'
      value: 'Priority'
      type: REG_DWORD
      data: 6

  - !registryValue:
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Games'
      value: 'Scheduling Category'
      type: REG_SZ
      data: 'High'

  # =========================
  # FULLSCREEN + GAME MODE LATENCY FIX
  # =========================

  - !registryValue:
      path: 'HKCU\System\GameConfigStore'
      value: 'GameDVR_DXGIHonorFSEWindowsCompatible'
      type: REG_DWORD
      data: 1

  - !registryValue:
      path: 'HKCU\System\GameConfigStore'
      value: 'GameDVR_HonorUserFSEBehaviorMode'
      type: REG_DWORD
      data: 1

  # =========================
  # INPUT LATENCY REDUCTION
  # =========================

  - !registryValue:
      path: 'HKCU\Control Panel\Mouse'
      value: 'MouseHoverTime'
      type: REG_SZ
      data: '0'

  - !registryValue:
      path: 'HKCU\Control Panel\Keyboard'
      value: 'KeyboardDelay'
      type: REG_SZ
      data: '0'

  # =========================
  # POWER OPTIMIZATION (REAL IMPACT)
  # =========================

  - !registryValue:
      path: 'HKLM\SYSTEM\CurrentControlSet\Control\Power\PowerThrottling'
      value: 'PowerThrottlingOff'
      type: REG_DWORD
      data: 1

  # =========================
  # GPU SCHEDULING BOOST (SAFE MODERN TWEAK)
  # =========================

  - !registryValue:
      path: 'HKLM\SYSTEM\CurrentControlSet\Control\GraphicsDrivers'
      value: 'HwSchMode'
      type: REG_DWORD
      data: 2

  # =========================
  # FINAL SYSTEM STABILIZATION
  # =========================

  - !writeStatus: {status: "ZLAG Gaming Core Engine Applied Successfully"}
  # Restart Explorer to apply tweaks
  - !powerShell:
      command: |
        Stop-Process -Name explorer -Force -ErrorAction SilentlyContinue
        Start-Process explorer
