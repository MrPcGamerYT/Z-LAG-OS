title: "Universal Context Menu Debloat (Safe & Aggressive)"
privilege: TrustedInstaller
actions:
  - !writeStatus: {status: "Initializing safe universal context menu cleanup..."}

  # ================================================================
  # 1. WINDOWS 11 CLASSIC MENU RESTORE
  # ================================================================
  - !registryValue: {path: 'HKCU\Software\Classes\CLSID\{86ca1aa0-34aa-4e8b-a509-50c905bae2a2}\InprocServer32', type: REG_SZ, data: ''}

  # ================================================================
  # 2. CORE SHELL EXTENSION BLOCKING (THE SAFE METHOD)
  # Instead of deleting GUIDs from HKCR, we block them OS-wide.
  # ================================================================
  
  # Block "Cast to Device" / "Play To"
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Shell Extensions\Blocked', value: '{7AD84985-87B4-4a16-BE58-8B72A5B390F7}', type: REG_SZ, data: ''}
  
  # Block Modern & Legacy "Share" UI
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Shell Extensions\Blocked', value: '{596AB062-B4D2-4215-9F74-E9109B0A8153}', type: REG_SZ, data: ''}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Shell Extensions\Blocked', value: '{f81e9010-6ea4-11ce-a7ff-00aa003ca9f6}', type: REG_SZ, data: ''}
  
  # Block "Send To" (Safely hides the menu without breaking file operations)
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Shell Extensions\Blocked', value: '{7BA4C740-9E81-11CF-99D3-00AA004AE837}', type: REG_SZ, data: ''}
  
  # Block "Pin to Start"
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Shell Extensions\Blocked', value: '{a2a9545d-a0c2-42b4-9708-a0b2badd77c8}', type: REG_SZ, data: ''}
  
  # Block "Pin to Taskbar"
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Shell Extensions\Blocked', value: '{90aa3a4e-1cba-4233-b8bb-535773d48449}', type: REG_SZ, data: ''}
  
  # Block "Pin to Quick Access" (Crucial: Blocking this instead of deleting it prevents the New Folder freeze)
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Shell Extensions\Blocked', value: '{679f85cb-0220-4080-b29b-5540cc05aab6}', type: REG_SZ, data: ''}

  # Block "Customize this folder" 
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Shell Extensions\Blocked', value: '{ef1b7f6b-9022-43de-bc6e-fdbe04c1d589}', type: REG_SZ, data: ''}

  # Block "Include in Library"
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Shell Extensions\Blocked', value: '{3D1975AF-48C6-4f8e-A182-BE0E08FA86A9}', type: REG_SZ, data: ''}

  # Block Windows Defender / Security Scan from context menu
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Shell Extensions\Blocked', value: '{09A47860-541B-475F-9FA5-D43A2B0D4F5D}', type: REG_SZ, data: ''}

  # Block "Troubleshoot Compatibility"
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Shell Extensions\Blocked', value: '{1d27f844-3a1f-4410-85ac-146d78461dae}', type: REG_SZ, data: ''}

  # ================================================================
  # 3. SAFE DIRECT DELETIONS (File-Specific Verbs)
  # These are safe to delete because they are isolated verbs attached
  # only to specific file extensions, not core Explorer namespaces.
  # ================================================================

  # Remove "Set as desktop background"
  - !registryValue: {path: 'HKCR\SystemFileAssociations\image\shell\setdesktopwallpaper', operation: delete}

  # Remove "Rotate left / Rotate right"
  - !registryValue: {path: 'HKCR\SystemFileAssociations\image\shell\rotateleft', operation: delete}
  - !registryValue: {path: 'HKCR\SystemFileAssociations\image\shell\rotateright', operation: delete}

  # Remove "Edit with Photos" & "Print" for images
  - !registryValue: {path: 'HKCR\SystemFileAssociations\image\shell\edit', operation: delete}
  - !registryValue: {path: 'HKCR\SystemFileAssociations\image\shell\print', operation: delete}

  # Remove "Edit with Paint 3D" & "3D Print"
  - !registryValue: {path: 'HKCR\SystemFileAssociations\image\shell\3D Edit', operation: delete}
  - !registryValue: {path: 'HKCR\SystemFileAssociations\image\shell\3D Print', operation: delete}

  # Remove "Burn to disc"
  - !registryValue: {path: 'HKCR\ISOFile\shell\burn', operation: delete}
  - !registryValue: {path: 'HKCR\Windows.IsoFile\shell\burn', operation: delete}

  # Remove Extra BitLocker Context Menus (Leave base OS encryption intact)
  - !registryValue: {path: 'HKCR\Drive\shell\encrypt-bde', operation: delete}
  - !registryValue: {path: 'HKCR\Drive\shell\manage-bde', operation: delete}

  # ================================================================
  # 4. RESTART EXPLORER TO APPLY
  # ================================================================
  - !taskKill: {name: 'explorer'}
  - !cmd: {command: 'start explorer.exe'}

  - !writeStatus: {status: "Universal context menu cleanup applied. OS is stable."}
