title: Removing Bloat Apps
description: Removal of APPX packages (Keeps NVIDIA, AMD, Intel, Critical System Apps)
privilege: TrustedInstaller
actions:

  - !writeStatus: {status: "Removing Appx Packages - Keeping GPU drivers and critical system apps"}
  - !powerShell:
      wait: true
      exeDir: true
      command: |
        .\appx_remover.ps1 -Packages @(
          'Microsoft.Windows.SecureAssessmentBrowser',
          'Microsoft.Windows.PeopleExperienceHost',
          'Microsoft.WindowsCamera',
          'MicrosoftWindows.Client.WebExperience',
          'Microsoft.WidgetsPlatformRuntime',
          'Microsoft.WindowsAlarms',
          'Microsoft.WindowsMaps',
          'Microsoft.MicrosoftStickyNotes',
          'microsoft.windowscommunicationsapps',
          'Microsoft.People',
          'Microsoft.BingNews',
          'Microsoft.BingSearch',
          'Microsoft.BingWeather',
          'Microsoft.MicrosoftSolitaireCollection',
          'Microsoft.WindowsFeedbackHub',
          'Microsoft.GetHelp',
          'Microsoft.Getstarted',
          'Microsoft.Todos',
          'Microsoft.PowerAutomateDesktop',
          'Microsoft.549981C3F5F10',
          'MicrosoftCorporationII.QuickAssist',
          'MicrosoftCorporationII.MicrosoftFamily',
          'Microsoft.ZuneMusic',
          'Microsoft.ZuneVideo',
          'Microsoft.WindowsSoundRecorder',
          'Clipchamp.Clipchamp',
          'Microsoft.Whiteboard',
          'Microsoft.MicrosoftTeamsforSurfaceHub',
          'MicrosoftCorporationII.MailforSurfaceHub',
          'Microsoft.MicrosoftPowerBIForWindows',
          'Microsoft.SkypeApp',
          'Microsoft.MicrosoftOfficeHub',
          'Microsoft.Office.Excel',
          'Microsoft.Office.PowerPoint',
          'Microsoft.Office.Word',
          'Microsoft.Office.OneNote',
          'Microsoft.OutlookForWindows',
          'SpotifyAB.SpotifyMusic',
          'OutlookPWA',
          'Microsoft.Microsoft3DViewer',
          'Microsoft.Advertising',
          'MixedReality.Portal',
          'Microsoft.MSPaint',
          'Microsoft.StartExperiencesApp',
          'Microsoft.Copilot',
          'MicrosoftTeams',
          'MSTeams',
          'Disney.37853FC22B2CE',
          'Netflix',
          'Microsoft.XboxApp',
          'Microsoft.XboxGamingOverlay',
          'Microsoft.XboxIdentityProvider',
          'Microsoft.XboxSpeechToTextOverlay',
          'Microsoft.Xbox.TCUI',
          'Microsoft.XboxGameCallableUI',
          'Microsoft.GamingApp',
          'Microsoft.YourPhone',
          'MicrosoftWindows.CrossDevice',
          'Microsoft.WindowsCalculator',
          'Microsoft.Windows.Photos',
          'Microsoft.WindowsStore',
          'Microsoft.ScreenSketch',
          'Microsoft.StorePurchaseApp'
        )

  - !writeStatus: {status: "Removing Photos", option: "remove-appx-photos"}
  - !powerShell:
      option: "remove-appx-photos"
      wait: true
      exeDir: true
      command: '.\appx_remover.ps1 -Packages "Microsoft.Windows.Photos"'

  - !writeStatus: {status: "Removing Dev Home", option: "remove-appx-devhome"}
  - !powerShell:
      option: "remove-appx-devhome"
      wait: true
      exeDir: true
      command: '.\appx_remover.ps1 -Packages "Microsoft.Windows.DevHome"'

  - !writeStatus: {status: "Removing Xbox Apps", option: "remove-appx-xbox"}
  - !powerShell:
      option: "remove-appx-xbox"
      wait: true
      exeDir: true
      command: '.\appx_remover.ps1 -Packages @("Microsoft.Xbox", "Microsoft.XboxApp", "Microsoft.GamingApp", "Microsoft.Edge.GameAssist") -ExcludePackages "Microsoft.XboxGameCallableUI"'

  # Xbox Registry Tweaks
  - !registryValue: {path: 'HKCR\ms-gamebar', value: '', type: REG_SZ, data: 'URL:ms-gamebar', option: "remove-appx-xbox"}
  - !registryValue: {path: 'HKCR\ms-gamebar', value: 'URL Protocol', type: REG_SZ, data: '', option: "remove-appx-xbox"}
  - !registryKey: {path: 'HKCR\ms-gamebar\shell\open\command', operation: add, option: "remove-appx-xbox"}
  - !registryValue: {path: 'HKCR\ms-gamebar', value: '', type: REG_SZ, data: '%SystemRoot%\System32\systray.exe', option: "remove-appx-xbox"}
  - !registryValue: {path: 'HKCU\Software\Microsoft\GameBar', value: 'ShowStartupPanel', type: REG_DWORD, data: 0, option: "remove-appx-xbox"}

  - !writeStatus: {status: "Removing Your Phone", option: "remove-appx-yourphone"}
  - !powerShell:
      option: "remove-appx-yourphone"
      wait: true
      exeDir: true
      command: '.\appx_remover.ps1 -Packages @("Microsoft.YourPhone", "MicrosoftWindows.CrossDevice")'

  
  # Clear AppX caches
  - !writeStatus: {status: 'Clearing AppX caches'}
  - !appx: {operation: clearCache, name: '*MicrosoftWindows.Client.CBS*'}
  - !appx: {operation: clearCache, name: '*Microsoft.Windows.Search*'}
  - !appx: {operation: clearCache, name: '*Microsoft.Windows.SecHealthUI*'}

  - !writeStatus: {status: "Downloading & Installing Visual C++ AIO, DirectX, and .NET Runtime..."}


  # Create shortcuts on Desktop for official GPU drivers (Syntax Error Fixed)
  - !powerShell:
      command: |
        $WshShell = New-Object -comObject WScript.Shell
        $DesktopPath = [System.Environment]::GetFolderPath('Desktop')
        
        $Shortcut = $WshShell.CreateShortcut($DesktopPath + '\Download NVIDIA Drivers.url')
        $Shortcut.TargetPath = 'https://www.nvidia.com/Download/index.aspx'
        $Shortcut.Save()
        
        $Shortcut2 = $WshShell.CreateShortcut($DesktopPath + '\Download AMD Drivers.url')
        $Shortcut2.TargetPath = 'https://www.amd.com/en/support'
        $Shortcut2.Save()
        
        $Shortcut3 = $WshShell.CreateShortcut($DesktopPath + '\Download Intel Drivers.url')
        $Shortcut3.TargetPath = 'https://www.intel.com/content/www/us/en/download-center/home.html'
        $Shortcut3.Save()

  - !writeStatus: {status: 'Installing utilities'}
  - !powerShell:
    command: '.\software.ps1'
    exeDir: true
    wait: true
    weight: 150
    runas: currentUserElevated

    # Browsers
  - !writeStatus: {status: 'Installing Brave', option: 'browser-brave'}
  - !powerShell:
    command: '.\software.ps1 -Brave'
    exeDir: true
    wait: true
    weight: 120
    option: 'browser-brave'
    runas: currentUserElevated
  - !writeStatus: {status: 'Installing operagx', option: 'opera-gx'}
  - !powerShell:
    command: '.\software.ps1 -OperaGX'
    exeDir: true
    wait: true
    weight: 120
    option: 'opera-gx'
    runas: currentUserElevated
  - !writeStatus: {status: 'Installing Google Chrome', option: 'browser-chrome'}
  - !powerShell:
    command: '.\software.ps1 -Chrome'
    exeDir: true
    wait: true
    weight: 120
    option: 'browser-chrome'
    runas: currentUserElevated

  - !writeStatus: {status: '✅ All bloatware removed successfully! GPU drivers and critical apps kept intact!'}
