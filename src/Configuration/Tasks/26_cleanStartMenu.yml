title: Clean Start Menu (Only App List - No Pinned Apps or Groups)
actions:
  - !writeStatus: {status: "Cleaning Start Menu - removing all pinned apps and groups..."}
  
  # ===== System‑wide start menu reset =====
  # Runs the batch script that:
  #   - Copies layout files to Default user profile and all existing users
  #   - Deletes start.bin cache and CloudStore tilegrid entries
  #   - Resets start menu for every user on the system
  - !cmd: {command: 'startmenu.cmd', exeDir: true}
  
  # ===== DISABLE RECENT APPS / FREQUENT APPS =====
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'Start_TrackProgs', type: REG_DWORD, data: 0}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'Start_TrackDocs', type: REG_DWORD, data: 0}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'Start_ShowRecentApps', type: REG_DWORD, data: 0}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'Start_ShowAddedApps', type: REG_DWORD, data: 0}
  
  # ===== DISABLE SUGGESTIONS AND ADS =====
  - !registryValue: {path: 'HKCU\Software\Policies\Microsoft\Windows\Explorer', value: 'ShowRecommendedSection', type: REG_DWORD, data: 0}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'Start_IrisRecommendations', type: REG_DWORD, data: 0}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager', value: 'SubscribedContent-314559Enabled', type: REG_DWORD, data: 0}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager', value: 'SubscribedContent-338387Enabled', type: REG_DWORD, data: 0}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager', value: 'SubscribedContent-338388Enabled', type: REG_DWORD, data: 0}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager', value: 'SubscribedContent-338389Enabled', type: REG_DWORD, data: 0}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager', value: 'SubscribedContent-338393Enabled', type: REG_DWORD, data: 0}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager', value: 'SoftLandingEnabled', type: REG_DWORD, data: 0}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager', value: 'PreInstalledAppsEnabled', type: REG_DWORD, data: 0}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager', value: 'OemPreInstalledAppsEnabled', type: REG_DWORD, data: 0}
  
  # ===== FORCE SHOW ALL APPS BY DEFAULT =====
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Policies\Explorer', value: 'NoStartMenuMorePrograms', type: REG_DWORD, data: 0}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Policies\Explorer', value: 'ShowStartMenuAllApps', type: REG_DWORD, data: 1}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'Start_ShowAllApps', type: REG_DWORD, data: 1}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'Start_ShowSettings', type: REG_DWORD, data: 1}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'Start_ShowDownloads', type: REG_DWORD, data: 0}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'Start_ShowUser', type: REG_DWORD, data: 0}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'Start_ShowPowerButton', type: REG_DWORD, data: 1}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'Start_ShowSearch', type: REG_DWORD, data: 0}
  
  # ===== DISABLE PINNED APP AREA COMPLETELY =====
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Policies\Explorer', value: 'NoPinnedAppsInStartMenu', type: REG_DWORD, data: 1}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Policies\Explorer', value: 'ClearRecentPrograms', type: REG_DWORD, data: 1}
  
  # ===== CLEAR START MENU LAYOUT CACHE (additional safety) =====
  - !powerShell: {command: 'Remove-Item -Path "$env:LOCALAPPDATA\Packages\Microsoft.Windows.StartMenuExperienceHost_cw5n1h2txyewy\LocalState\StartMenuExperienceHost.settings" -Force -ErrorAction SilentlyContinue'}
  - !powerShell: {command: 'Remove-Item -Path "$env:LOCALAPPDATA\Packages\Microsoft.Windows.StartMenuExperienceHost_cw5n1h2txyewy\Settings\settings.dat" -Force -ErrorAction SilentlyContinue'}
  
  # ===== RESTART EXPLORER =====
  - !taskKill: {name: 'explorer'}
  - !cmd: {command: 'start explorer.exe'}
  
  - !writeStatus: {status: "Start Menu cleaned! Only app list visible, no pinned groups."}