title: Applying Super Fast Performance & Clean Shell Playbook
actions:
  - !writeStatus: {status: "Applying Super Fast Performance..."}

  # Section 1: General Shell Usability Tweaks
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'LaunchTo', type: REG_DWORD, data: 1} # Forces File Explorer to open to This PC instead of bloated Quick Access

  # Section 2: High-Responsiveness Context Menu Tweak
  - !registryValue: {path: 'HKCU\Software\Classes\CLSID\{86ca1aa0-34aa-4e8b-a509-50c905bae2a2}\InprocServer32', value: '', type: REG_SZ, data: ''} # Installs clean classic context menu instantly

  # Section 3: Safe User Folder Visibility Policies (Prevents Folder Renaming Bugs)
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\FolderDescriptions\{2112AB0A-C86A-4ffe-A368-0DE96E47012E}\PropertyBag', value: 'ThisPCPolicy', type: REG_SZ, data: 'Hide'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\FolderDescriptions\{491E922F-5643-4af4-A7EB-4E7A138D8174}\PropertyBag', value: 'ThisPCPolicy', type: REG_SZ, data: 'Hide'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\FolderDescriptions\{7b0db17d-9cd2-4a93-9733-46cc89022e7c}\PropertyBag', value: 'ThisPCPolicy', type: REG_SZ, data: 'Hide'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\FolderDescriptions\{A302545D-DEFF-464b-ABE8-61C8648D939B}\PropertyBag', value: 'ThisPCPolicy', type: REG_SZ, data: 'Hide'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\FolderDescriptions\{A990AE9F-A03B-4e80-94BC-9912D7504104}\PropertyBag', value: 'ThisPCPolicy', type: REG_SZ, data: 'Hide'}

  # Section 4: Safe Submenu Blocklists (Disables Context Overhead)
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Shell Extensions\Blocked', value: '{f81e9010-6ea4-11ce-a7ff-00aa003ca9f6}', type: REG_SZ, data: 'Sharing'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Shell Extensions\Blocked', value: '{7AD84985-87B4-4a16-BE58-8B72A5B390F7}', type: REG_SZ, data: 'PlayTo'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Shell Extensions\Blocked', value: '{596AB062-B4D2-4215-9F74-E9109B0A8153}', type: REG_SZ, data: 'Previous Versions'}

  # Section 5: Zero Animation & Instant Interface Tweaks
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects', value: 'VisualFXSetting', type: REG_DWORD, data: 2} # Configures global profile style to "Adjust for best performance"
  - !registryValue: {path: 'HKCU\Control Panel\Desktop\WindowMetrics', value: 'MinAnimate', type: REG_SZ, data: '0'} # Completely kills minimization and maximization window scale animations
  - !registryValue: {path: 'HKCU\Control Panel\Desktop', value: 'MenuShowDelay', type: REG_SZ, data: '0'} # Drops standard cascading submenu response time down to 0ms
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'TaskbarAnimations', type: REG_DWORD, data: 0} # Turns off sliding animations for icons on the system tray and taskbar
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize', value: 'EnableTransparency', type: REG_DWORD, data: 0} # Disables fluid transparency to reduce constant GPU composition draw calls

  # Section 6: Engine Performance & Responsiveness Tweaks
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile', value: 'SystemResponsiveness', type: REG_DWORD, data: 0} # Passes full processing prioritization to active foreground tasks
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Serialize', value: 'StartupDelayInMSec', type: REG_DWORD, data: 0} # Wipes out the built-in startup delay to execute user login apps immediately
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control', value: 'WaitToKillServiceTimeout', type: REG_SZ, data: '2000'} # Drops stuck service termination limits during system power-off sequences down to 2 seconds
