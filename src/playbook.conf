<?xml version="1.0" encoding="utf-8"?>
<Playbook>
    <Name>Z LAG OS</Name>
    <Username>ZERO LAG</Username>
    <ShortDescription>Maximum FPS and zero lag gaming for Windows 10/11</ShortDescription>
    <Title>Z LAG OS - Zero Lag Gaming Optimization</Title>
    <Description><![CDATA[
Target: Maximum FPS and Zero Lag Experience
Works on: Windows 10 and Windows 11
]]></Description>
    <Version>2.0</Version>
    <Requirements>
        <Requirement>Internet</Requirement>
        <Requirement>DefenderToggled</Requirement>
		<Requirement>NoAntivirus</Requirement>
    </Requirements>
    <UniqueId>ff01afe4-21fb-46db-bb07-fc89c1cef47c</UniqueId>
	<Git>https://github.com/MrPcGamerYT/Z-LAG-OS</Git>
    <Overhaul>true</Overhaul>
    <EstimatedMinutes>15</EstimatedMinutes>
    <FeaturePages>
        <RadioImagePage CheckDefaultBrowser="true" DependsOn="software"
            DefaultOption="browser-chrome" IsRequired="true"
            Description="Please select a preferred browser. We can only provide a curated experience for some options.">
            <Options>
				<RadioImageOption>
					<Text>Chrome</Text>
					<Name>browser-chrome</Name>
					<FileName>chrome</FileName>
					<GradientTopColor>#057DB6</GradientTopColor>
					<GradientBottomColor>#86D8FF</GradientBottomColor>
				</RadioImageOption>
                <RadioImageOption>
					<Text>Brave</Text>
					<Name>browser-brave</Name>
					<FileName>brave</FileName>
					<GradientTopColor>#131524</GradientTopColor>
					<GradientBottomColor>#3b3e4f</GradientBottomColor>
				</RadioImageOption>
				<RadioImageOption>
					<Text>OperaGX</Text>
					<Name>opera-gx</Name>
					<FileName>operagx</FileName>
					<GradientTopColor>#000004</GradientTopColor>
					<GradientBottomColor>#700009</GradientBottomColor>
				</RadioImageOption>
				<RadioImageOption>
					<Text>None</Text>
					<Name>none</Name>
					<FileName>none</FileName>
					<GradientTopColor>#7E7E7E</GradientTopColor>
					<GradientBottomColor>#D0D0D0</GradientBottomColor>
				</RadioImageOption>
			</Options>
            <BottomLine Text="Privacy comparison" Link="https://privacytests.org/" />
        </RadioImagePage>
         <RadioPage IsRequired="true" DefaultOption="defender-keep" Description="Disabling Defender reduces security, and is an option for advanced users only.">
            <TopLine Text="⚠️ WARNING: Disabling Defender leaves your system vulnerable to malware."/>
            <Options>
                <RadioOption>
                    <Text>Keep Windows Defender (recommended)</Text>
                    <Name>defender-keep</Name>
                </RadioOption>
                <RadioOption>
                    <Text>Disable Windows Defender (Max Performance)</Text>
                    <Name>defender-disable</Name>
                </RadioOption>
            </Options>
        </RadioPage>
    </FeaturePages>
</Playbook>
