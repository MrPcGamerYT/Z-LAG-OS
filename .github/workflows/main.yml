name: Package and Release Z LAG OS.apbx

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: "Project version (example: 1.0)"
        required: true
        default: "0.1"

jobs:
  package-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get tag version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Update version in playbook.conf
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          sed -i "s|<Version>.*</Version>|<Version>$VERSION</Version>|" src/playbook.conf
          cat src/playbook.conf

      - name: Commit version change to repository
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add src/playbook.conf
          git commit -m "Update version to ${{ steps.get_version.outputs.version }}" || echo "No changes to commit"
          git push

      - name: Install p7zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Archive ./src/ to Z_LAG_OS.apbx with password
        run: |
          7z a -p"malte" -t7z ZLAGOS.7z ./src/*
          mv ZLAGOS.7z Z_LAG_OS.apbx

      - name: Delete existing release (if any) to allow asset update
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ steps.get_version.outputs.version }}" --yes || true

      - name: Create Release and Upload Asset
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          artifacts: "Z_LAG_OS.apbx"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
