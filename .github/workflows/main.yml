name: Package and Release Z LAG OS.apbx

on:
  push:
    tags:
      - '*'  # Trigger on any tag
  workflow_dispatch:
    inputs:
      version:
        description: "Project version (example: 1.0)"
        required: true
        default: "0.1"

jobs:
  package-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # This gives permission to create releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get tag version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Update version in playbook.conf
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          sed -i "s|<Version>.*</Version>|<Version>$VERSION</Version>|" src/playbook.conf
          echo "Updated playbook.conf with version $VERSION"
          cat src/playbook.conf

      - name: Install p7zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Archive ./src/ to ZLAGOS.apbx with password
        run: |
          7z a -p"malte" -t7z ZLAGOS.7z ./src/*
          mv ZLAGOS.7z ZLAGOS.apbx

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          files: ZLAGOS.apbx
