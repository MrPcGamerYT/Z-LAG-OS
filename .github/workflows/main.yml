name: Package and Release Z LAG OS.apbx

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: "Project version (example: 1.0 or v1.0)"
        required: true
        default: "0.1"

jobs:
  package-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # This is sufficient to create, delete, and upload to releases

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout the repository
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4   # Node 20 deprecation is harmless

      # ------------------------------------------------------------------
      # 2. Normalise the version tag (optional v-prefix)
      # ------------------------------------------------------------------
      - name: Determine version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            RAW="${{ github.ref_name }}"
          else
            RAW="${{ github.event.inputs.version }}"
          fi

          # Add 'v' prefix if you use tags like v1.2.3. Remove the next two lines if you never use a prefix.
          if [[ "$RAW" != v* ]]; then
            RAW="v$RAW"
          fi

          echo "version=$RAW" >> $GITHUB_OUTPUT
          echo "Using version: $RAW"

      # ------------------------------------------------------------------
      # 3. Update version inside playbook.conf
      # ------------------------------------------------------------------
      - name: Update version in playbook.conf
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          sed -i "s|<Version>.*</Version>|<Version>$VERSION</Version>|" src/playbook.conf
          cat src/playbook.conf

      # ------------------------------------------------------------------
      # 4. Commit the version change (optional)
      # ------------------------------------------------------------------
      - name: Commit version change to repository
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add src/playbook.conf
          git commit -m "Update version to ${{ steps.get_version.outputs.version }}" || echo "No changes to commit"
          git push

      # ------------------------------------------------------------------
      # 5. Install archiver
      # ------------------------------------------------------------------
      - name: Install p7zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      # ------------------------------------------------------------------
      # 6. Create the .apbx archive
      # ------------------------------------------------------------------
      - name: Archive ./src/ to Z_LAG_OS.apbx with password
        run: |
          7z a -p"malte" -t7z ZLAGOS.7z ./src/*
          mv ZLAGOS.7z Z_LAG_OS.apbx

      # ------------------------------------------------------------------
      # 7. Verify the .apbx exists (fail early if missing)
      # ------------------------------------------------------------------
      - name: Check archive file
        run: |
          if [ ! -f "Z_LAG_OS.apbx" ]; then
            echo "::error::Z_LAG_OS.apbx not found! Aborting."
            exit 1
          fi
          ls -lh Z_LAG_OS.apbx

      # ------------------------------------------------------------------
      # 8. Delete ALL existing releases – robust version
      #    This step ONLY ignores “release not found” errors. Any other
      #    failure (token, permissions, network) will stop the job.
      # ------------------------------------------------------------------
      - name: Delete all existing releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail   # Fail on any error, undefined var, or pipe failure
          echo "Fetching releases..."
          tags=$(gh release list --json tagName -q '.[].tagName' 2>&1) || {
            echo "::error::Failed to list releases: $tags"
            exit 1
          }
          if [ -n "$tags" ]; then
            while IFS= read -r tag; do
              echo "Deleting release: $tag"
              # Delete the release; allow only "release not found" exit code (1)
              # to be treated as success (e.g., if it was already deleted by
              # another run). All other failures are fatal.
              output=$(gh release delete "$tag" --yes 2>&1) && ec=$? || ec=$?
              if [ $ec -ne 0 ]; then
                if echo "$output" | grep -qi "not found"; then
                  echo "Release $tag already gone."
                else
                  echo "::error::Deletion failed for $tag: $output"
                  exit 1
                fi
              else
                echo "Deleted release $tag"
              fi
            done <<< "$tags"
          else
            echo "No releases to delete."
          fi

      # ------------------------------------------------------------------
      # 9. Create a NEW release and upload the .apbx
      #    No allowUpdates/replacesArtifacts – we start clean every time.
      # ------------------------------------------------------------------
      - name: Create release and upload asset
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          artifacts: "Z_LAG_OS.apbx"
          token: ${{ secrets.GITHUB_TOKEN }}
          # NO allowUpdates: true
          # NO replacesArtifacts: true

      # ------------------------------------------------------------------
      # 10. Remove GitHub’s automatic source archives (zip, tar.gz)
      # ------------------------------------------------------------------
      - name: Remove unwanted source archives
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.get_version.outputs.version }}"
          echo "Cleaning up auto‑generated assets for release $TAG..."
          # Delete every asset EXCEPT Z_LAG_OS.apbx
          gh release view "$TAG" --json assets -q '.assets[] | select(.name != "Z_LAG_OS.apbx") | .id' | while read -r id; do
            echo "Removing asset ID $id"
            gh release delete-asset "$TAG" "$id" -y
          done
          echo "Final assets:"
          gh release view "$TAG" --json assets -q '.assets[].name'
